name: ThistleOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  firmware-build:
    name: Build Firmware (ESP-IDF)
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py build

      - name: Check firmware size
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py size
          # Fail if firmware exceeds 3MB (OTA partition limit is 3.5MB)
          SIZE=$(idf.py size 2>&1 | grep "Total image" | grep -oE '[0-9]+' | head -1)
          echo "Firmware size: $SIZE bytes"
          if [ "$SIZE" -gt 3145728 ]; then
            echo "ERROR: Firmware exceeds 3MB limit!"
            exit 1
          fi

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: thistle-os-firmware
          path: build/thistle_os.bin

  simulator-build:
    name: Build Simulator (SDL2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev pkg-config cmake build-essential libcurl4-openssl-dev

      - name: Build ESP-IDF first (for managed components)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5
          target: esp32s3
          command: idf.py build

      - name: Build simulator
        run: |
          cd simulator
          mkdir -p build && cd build
          cmake ..
          make -j$(nproc)

      - name: Upload simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: thistle-sim
          path: simulator/build/thistle_sim

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config auto \
            --config p/c-audit \
            --config p/security-audit \
            --sarif --output semgrep-results.sarif \
            components/ main/ simulator/platform/ simulator/drivers/ \
            || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
        continue-on-error: true

      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.sarif

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          scanners: vuln,secret,misconfig

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif
