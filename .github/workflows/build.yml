name: ThistleOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  firmware-build:
    name: Build Firmware (ESP-IDF)
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Rust ESP toolchain
        uses: actions/cache@v4
        id: rust-cache
        with:
          path: |
            /root/.cargo
            /root/.rustup
          key: rust-esp-toolchain-v2
          restore-keys: rust-esp-toolchain-

      - name: Install Rust ESP toolchain
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f "$HOME/.cargo/bin/cargo" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly
          fi
          . "$HOME/.cargo/env"
          if ! command -v espup &> /dev/null; then
            cargo install espup
          fi
          espup install || echo "espup install failed (may be cached)"
          # NOTE: Do NOT source export-esp.sh here — it overrides ESP-IDF's
          # GCC with an incompatible version. The kernel_rs CMakeLists.txt
          # adds cargo to PATH when invoking the Rust build.

      - name: Cache ESP-IDF + Rust builds
        uses: actions/cache@v4
        with:
          path: |
            build
            managed_components
            components/kernel_rs/target
          key: espidf-v5.5-rust-${{ hashFiles('components/**/*.c', 'components/**/*.h', 'components/kernel_rs/src/**', 'main/**', 'sdkconfig.defaults', 'partitions.csv') }}
          restore-keys: |
            espidf-v5.5-rust-

      - name: Build firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          export PATH="$HOME/.cargo/bin:$PATH"
          idf.py set-target esp32s3
          idf.py build

      - name: Check firmware size
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          SIZE=$(idf.py size 2>&1 | grep "Total image" | grep -oE '[0-9]+' | head -1)
          echo "Firmware size: $SIZE bytes ($(($SIZE / 1024)) KB)"
          if [ "$SIZE" -gt 4718592 ]; then
            echo "::error::Firmware exceeds 4.5MB OTA partition limit!"
            exit 1
          fi

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: thistle-os-firmware
          path: build/thistle_os.bin

  rust-tests:
    name: Rust Kernel Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.rustup
          key: rust-stable-${{ runner.os }}-${{ hashFiles('components/kernel_rs/Cargo.lock') }}
          restore-keys: rust-stable-${{ runner.os }}-

      - name: Cache Cargo build artifacts
        uses: actions/cache@v4
        with:
          path: components/kernel_rs/target
          key: rust-test-target-${{ runner.os }}-${{ hashFiles('components/kernel_rs/Cargo.lock') }}
          restore-keys: rust-test-target-${{ runner.os }}-

      - name: Install Rust
        run: |
          if [ ! -f "$HOME/.cargo/bin/cargo" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Run Rust kernel tests
        working-directory: components/kernel_rs
        run: cargo test --target x86_64-unknown-linux-gnu -- --test-threads=1

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Semgrep (text output for log visibility)
        run: |
          echo "::group::Semgrep scan results"
          semgrep scan \
            --config auto \
            --config p/c-audit \
            --config p/security-audit \
            --config .github/semgrep.yml \
            --error \
            --severity ERROR \
            --severity WARNING \
            components/ main/ 2>&1 || SCAN_EXIT=$?
          echo "::endgroup::"
          echo "Semgrep exit code: ${SCAN_EXIT:-0}"

      - name: Run Semgrep (SARIF output for GitHub Security tab)
        if: always()
        run: |
          semgrep scan \
            --config auto \
            --config p/c-audit \
            --config p/security-audit \
            --config .github/semgrep.yml \
            --sarif --output semgrep-results.sarif \
            components/ main/ || true

      - name: Check for ERROR/WARNING findings
        if: always()
        run: |
          if [ -f semgrep-results.sarif ]; then
            ERRORS=$(python3 -c "
          import json
          d = json.load(open('semgrep-results.sarif'))
          results = d.get('runs', [{}])[0].get('results', [])
          errors = [r for r in results if r.get('level') in ('error', 'warning')]
          for e in errors:
              loc = e.get('locations', [{}])[0].get('physicalLocation', {})
              uri = loc.get('artifactLocation', {}).get('uri', '?')
              line = loc.get('region', {}).get('startLine', '?')
              msg = e.get('message', {}).get('text', '?')[:120]
              print(f'::error file={uri},line={line}::{msg}')
          print(len(errors))
          " 2>/dev/null | tail -1)
            echo "Semgrep ERROR/WARNING findings: $ERRORS"
            if [ "$ERRORS" -gt 0 ] 2>/dev/null; then
              echo "::error::Semgrep found $ERRORS error/warning-level issues!"
              exit 1
            fi
          fi

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
        continue-on-error: true

      - name: Upload Semgrep artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.sarif

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Run Trivy (SARIF for GitHub Security tab)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          scanners: vuln,secret,misconfig

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Upload Trivy artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif
