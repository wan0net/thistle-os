name: ThistleOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  firmware-build:
    name: Build Firmware (ESP-IDF)
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache Rust ESP toolchain
        uses: actions/cache@v5
        id: rust-cache
        with:
          path: |
            /root/.cargo
            /root/.rustup
          key: rust-esp-toolchain-v3-espup016
          # Don't restore from older prefixes — older caches have espup 0.17.0
          # contents that break the build. Only match the fully-qualified key.

      - name: Install Rust ESP toolchain
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f "$HOME/.cargo/bin/cargo" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly
          fi
          . "$HOME/.cargo/env"
          # Pin espup to 0.16.0 — 0.17.0 (released 2026-04-17) has a regression
          # that aborts with "Unsuported file extension: 'part'" during install.
          if ! command -v espup &> /dev/null || [ "$(espup --version 2>/dev/null | awk '{print $2}')" != "0.16.0" ]; then
            cargo install espup --version 0.16.0 --force
          fi
          if ! command -v ldproxy &>/dev/null; then
            espup install
          fi
          # NOTE: Do NOT source export-esp.sh here — it overrides ESP-IDF's
          # GCC with an incompatible version. The kernel_rs CMakeLists.txt
          # adds cargo to PATH when invoking the Rust build.

      - name: Cache ESP-IDF + Rust builds
        uses: actions/cache@v5
        with:
          path: |
            build
            managed_components
            components/kernel_rs/target
          key: espidf-v5.5-rust-${{ hashFiles('components/**/*.c', 'components/**/*.h', 'components/kernel_rs/src/**', 'main/**', 'sdkconfig.defaults', 'partitions.csv') }}
          restore-keys: |
            espidf-v5.5-rust-

      - name: Build firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          export PATH="$HOME/.cargo/bin:$PATH"
          idf.py set-target esp32s3
          idf.py build

      - name: Check firmware size
        shell: bash
        run: |
          python3 tools/check_partition_sizes.py \
            --partition-table partitions.csv \
            --firmware build/thistle_os.bin

      - name: Sign firmware
        if: env.THISTLE_SIGNING_KEY != ''
        env:
          THISTLE_SIGNING_KEY: ${{ secrets.THISTLE_SIGNING_KEY }}
        shell: bash
        run: |
          apt-get update
          apt-get install -y python3-venv
          python3 -m venv /tmp/thistle-signing-venv
          /tmp/thistle-signing-venv/bin/pip install PyNaCl
          /tmp/thistle-signing-venv/bin/python -c "
          import nacl.signing, os
          key_hex = os.environ['THISTLE_SIGNING_KEY']
          sk = nacl.signing.SigningKey(bytes.fromhex(key_hex))
          data = open('build/thistle_os.bin', 'rb').read()
          signed = sk.sign(data)
          sig = signed.signature  # 64-byte Ed25519 signature
          open('build/thistle_os.bin.sig', 'wb').write(sig)
          vk = sk.verify_key
          open('build/thistle_os.bin.pub', 'wb').write(vk.encode())
          print(f'Signed: {len(data)} bytes, sig: {sig.hex()[:32]}...')
          "

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: thistle-os-firmware
          path: |
            build/thistle_os.bin
            build/thistle_os.bin.sig
            build/thistle_os.bin.pub

  rust-tests:
    name: Rust Kernel Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache Rust toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.rustup
          key: rust-stable-${{ runner.os }}-${{ hashFiles('components/kernel_rs/Cargo.lock') }}
          restore-keys: rust-stable-${{ runner.os }}-

      - name: Cache Cargo build artifacts
        uses: actions/cache@v5
        with:
          path: components/kernel_rs/target
          key: rust-test-target-${{ runner.os }}-${{ hashFiles('components/kernel_rs/Cargo.lock') }}
          restore-keys: rust-test-target-${{ runner.os }}-

      - name: Install Rust
        run: |
          if [ ! -f "$HOME/.cargo/bin/cargo" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Run Rust kernel tests
        working-directory: components/kernel_rs
        run: cargo test --target x86_64-unknown-linux-gnu -- --test-threads=1

      - name: Install cargo-audit
        run: |
          if [ ! -f "$HOME/.cargo/bin/cargo-audit" ]; then
            cargo install cargo-audit
          fi

      - name: Run cargo-audit (Rust dependency CVE check)
        working-directory: components/kernel_rs
        run: cargo audit

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Run Semgrep (text output for log visibility)
        run: |
          echo "::group::Semgrep scan results"
          semgrep scan \
            --config auto \
            --config p/default \
            --config .github/semgrep.yml \
            --error \
            --severity ERROR \
            --severity WARNING \
            components/ main/ 2>&1 || SCAN_EXIT=$?
          echo "::endgroup::"
          echo "Semgrep exit code: ${SCAN_EXIT:-0}"

      - name: Run Semgrep (SARIF output for GitHub Security tab)
        if: always()
        run: |
          semgrep scan \
            --config auto \
            --config p/default \
            --config .github/semgrep.yml \
            --sarif --output semgrep-results.sarif \
            components/ main/ || true

      - name: Check for ERROR/WARNING findings
        if: always()
        run: |
          if [ -f semgrep-results.sarif ]; then
            ERRORS=$(python3 -c "
          import json
          d = json.load(open('semgrep-results.sarif'))
          results = d.get('runs', [{}])[0].get('results', [])
          errors = [r for r in results if r.get('level') in ('error', 'warning')]
          for e in errors:
              loc = e.get('locations', [{}])[0].get('physicalLocation', {})
              uri = loc.get('artifactLocation', {}).get('uri', '?')
              line = loc.get('region', {}).get('startLine', '?')
              msg = e.get('message', {}).get('text', '?')[:120]
              print(f'::error file={uri},line={line}::{msg}')
          print(len(errors))
          " 2>/dev/null | tail -1)
            echo "Semgrep ERROR/WARNING findings: $ERRORS"
            if [ "$ERRORS" -gt 0 ] 2>/dev/null; then
              echo "::error::Semgrep found $ERRORS error/warning-level issues!"
              exit 1
            fi
          fi

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif
        continue-on-error: true

      - name: Upload Semgrep artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.sarif

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Run Trivy (SARIF for GitHub Security tab)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          scanners: vuln,secret,misconfig

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Upload Trivy artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif

  recovery-build:
    name: Build Recovery OS (Rust/esp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache Rust ESP toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            ~/.rustup
            ~/.espup
          key: rust-esp-recovery-${{ runner.os }}-v2-espup016
          # Don't restore from older prefixes — v1 caches contain corrupt
          # espup 0.17.0 state that reproduces the "part" extension error.

      - name: Install Rust + espup + ldproxy
        shell: bash
        run: |
          if [ ! -f "$HOME/.cargo/bin/cargo" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          . "$HOME/.cargo/env"
          # Pin espup to 0.16.0 — 0.17.0 (released 2026-04-17) has a regression
          # that aborts with "Unsuported file extension: 'part'" during install.
          if ! command -v espup &> /dev/null || [ "$(espup --version 2>/dev/null | awk '{print $2}')" != "0.16.0" ]; then
            cargo install espup --version 0.16.0 --force
          fi
          # Clear any stale .part files from prior interrupted runs so espup
          # doesn't try to re-use them.
          find "$HOME/.rustup" "$HOME/.espup" -name '*.part' -delete 2>/dev/null || true
          if [ ! -f "$HOME/export-esp.sh" ]; then
            espup install
          fi
          # ldproxy is the linker wrapper cargo invokes for xtensa-esp32s3-espidf.
          # espup installs the toolchain but not ldproxy; cargo install it explicitly.
          if ! command -v ldproxy &> /dev/null; then
            cargo install ldproxy
          fi

      - name: Cache recovery target dir
        uses: actions/cache@v5
        with:
          path: recovery/target
          key: recovery-target-${{ runner.os }}-${{ hashFiles('recovery/Cargo.lock', 'recovery/src/**') }}
          restore-keys: recovery-target-${{ runner.os }}-

      - name: Build recovery
        shell: bash
        working-directory: recovery
        run: |
          . "$HOME/.cargo/env"
          . "$HOME/export-esp.sh"
          cargo build --release

      - name: Check recovery size
        run: |
          python3 tools/check_partition_sizes.py \
            --partition-table partitions.csv \
            --recovery recovery/target/xtensa-esp32s3-espidf/release/thistle-recovery

      - name: Upload recovery artifact
        uses: actions/upload-artifact@v7
        with:
          name: thistle-recovery
          path: recovery/target/xtensa-esp32s3-espidf/release/thistle-recovery
