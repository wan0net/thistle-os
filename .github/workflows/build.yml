name: ThistleOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  firmware-build:
    name: Build Firmware (ESP-IDF)
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5
    steps:
      - uses: actions/checkout@v4

      - name: Cache ESP-IDF build
        uses: actions/cache@v4
        with:
          path: |
            build
            managed_components
          key: espidf-build-${{ hashFiles('components/**/*.c', 'components/**/*.h', 'main/**', 'sdkconfig.defaults', 'partitions.csv') }}
          restore-keys: |
            espidf-build-

      - name: Build firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py build

      - name: Check firmware size
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          SIZE=$(idf.py size 2>&1 | grep "Total image" | grep -oE '[0-9]+' | head -1)
          echo "Firmware size: $SIZE bytes ($(($SIZE / 1024)) KB)"
          if [ "$SIZE" -gt 3670016 ]; then
            echo "::error::Firmware exceeds 3.5MB OTA partition limit!"
            exit 1
          fi

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: thistle-os-firmware
          path: build/thistle_os.bin

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config auto \
            --config p/c-audit \
            --config p/security-audit \
            --config .github/semgrep.yml \
            --sarif --output semgrep-results.sarif \
            components/ main/ \
            || true

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
        continue-on-error: true

      - name: Upload Semgrep artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.sarif

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          scanners: vuln,secret,misconfig

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Upload Trivy artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif
