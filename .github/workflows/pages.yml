name: Deploy Pages (Docs + WASM Simulator)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Docs + WASM Simulator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache Rust toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.rustup
          key: rust-wasm-${{ runner.os }}-${{ hashFiles('components/kernel_rs/Cargo.lock') }}
          restore-keys: rust-wasm-${{ runner.os }}-

      - name: Cache Rust WASM build
        uses: actions/cache@v5
        with:
          path: components/kernel_rs/target
          key: rust-wasm-target-${{ runner.os }}-${{ hashFiles('components/kernel_rs/Cargo.lock', 'components/kernel_rs/src/**', 'crates/thistle-tk/src/**') }}
          restore-keys: rust-wasm-target-${{ runner.os }}-

      - name: Cache LVGL
        uses: actions/cache@v5
        with:
          path: managed_components/lvgl__lvgl
          key: lvgl-v9.2.2

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v16
        with:
          version: 3.1.51
          actions-cache-folder: 'emsdk-cache'

      - name: Install Rust + WASM target
        run: |
          if [ ! -f "$HOME/.cargo/bin/cargo" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          rustup target add wasm32-unknown-emscripten

      - name: Build Rust kernel for WASM
        working-directory: components/kernel_rs
        run: cargo build --release --target wasm32-unknown-emscripten

      - name: Fetch LVGL (needed for WASM build)
        run: |
          mkdir -p managed_components/lvgl__lvgl
          if [ ! -d "managed_components/lvgl__lvgl/src" ]; then
            git clone --depth 1 --branch v9.2.2 https://github.com/lvgl/lvgl.git managed_components/lvgl__lvgl
          fi

      - name: Build WASM simulator
        run: |
          cd wasm
          mkdir -p build && cd build
          emcmake cmake ..
          make -j"$(nproc)"

      - name: Assemble Pages site
        run: |
          mkdir -p _site

          # Homepage
          cp site/index.html _site/

          # Documentation
          mkdir -p _site/docs
          cp -r docs/* _site/docs/

          # WASM simulator
          mkdir -p _site/simulator
          cp wasm/build/thistle_wasm.html _site/simulator/index.html
          cp wasm/build/thistle_wasm.js _site/simulator/
          cp wasm/build/thistle_wasm.wasm _site/simulator/
          cp wasm/build/thistle_wasm.data _site/simulator/ 2>/dev/null || true

          # App store catalog
          mkdir -p _site/apps
          cp simulator/sdcard/appstore/catalog.json _site/apps/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v5
