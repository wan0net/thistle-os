name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  board-catalog-validation:
    name: Board Catalog Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build recovery board catalog
        run: |
          python3 tools/build_board_catalog.py \
            sdcard_layout/config/boards \
            --base-url "https://wan0net.github.io/thistle-os/config/boards" \
            --output /tmp/thistle-board-catalog.json

      - name: Validate board configs and catalog
        run: |
          python3 tools/validate_board_catalog.py \
            --repo . \
            --catalog /tmp/thistle-board-catalog.json

  unit-tests:
    name: Unit Tests (Host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev pkg-config cmake build-essential libcurl4-openssl-dev

      # Note: On-target ESP-IDF Unity tests require hardware.
      # This job verifies the test code compiles and the simulator builds.
      - name: Verify test compilation
        run: |
          echo "Test files:"
          find components/test_thistle -name "*.c" -exec wc -l {} + | sort -n
          echo ""
          echo "Total test cases (approximate):"
          grep -r "TEST_CASE" components/test_thistle/ | wc -l

  simulator-boot:
    name: Simulator Boot Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev pkg-config cmake build-essential libcurl4-openssl-dev

      - name: Cache Rust toolchain and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.rustup
            components/kernel_rs/target
          key: rust-sim-${{ runner.os }}-${{ hashFiles('components/kernel_rs/Cargo.lock', 'components/kernel_rs/src/**', 'crates/thistle-tk/src/**') }}

      - name: Install Rust
        run: |
          if [ ! -f "$HOME/.cargo/bin/cargo" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Fetch LVGL (managed component for simulator)
        run: |
          if [ ! -d "managed_components/lvgl__lvgl/src" ]; then
            mkdir -p managed_components/lvgl__lvgl
            git clone --depth 1 --branch v9.2.2 https://github.com/lvgl/lvgl.git managed_components/lvgl__lvgl
          fi

      - name: Build simulator
        working-directory: simulator
        run: |
          mkdir -p build && cd build
          cmake .. && make -j$(nproc)

      - name: Run boot test
        working-directory: simulator
        run: |
          ./build/thistle_sim --headless --timeout 5000 \
            --assert tests/boot_assertions.txt \
            --device tdeck

  simulator-integration:
    name: Simulator Integration Tests
    runs-on: ubuntu-latest
    needs: simulator-boot  # Only run if basic boot passes
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev pkg-config cmake build-essential libcurl4-openssl-dev

      - name: Cache Rust toolchain and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.rustup
            components/kernel_rs/target
          key: rust-sim-${{ runner.os }}-${{ hashFiles('components/kernel_rs/Cargo.lock', 'components/kernel_rs/src/**', 'crates/thistle-tk/src/**') }}

      - name: Install Rust
        run: |
          if [ ! -f "$HOME/.cargo/bin/cargo" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Fetch LVGL (managed component for simulator)
        run: |
          if [ ! -d "managed_components/lvgl__lvgl/src" ]; then
            mkdir -p managed_components/lvgl__lvgl
            git clone --depth 1 --branch v9.2.2 https://github.com/lvgl/lvgl.git managed_components/lvgl__lvgl
          fi

      - name: Build simulator
        working-directory: simulator
        run: |
          mkdir -p build && cd build
          cmake .. && make -j$(nproc)

      - name: Run integration tests
        working-directory: simulator
        run: bash tests/run_integration_tests.sh

  rust-kernel-tests:
    name: Rust Kernel Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache Rust toolchain and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.rustup
            components/kernel_rs/target
          key: rust-kernel-${{ runner.os }}-${{ hashFiles('components/kernel_rs/Cargo.lock') }}

      - name: Install Rust
        run: |
          if [ ! -f "$HOME/.cargo/bin/cargo" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Run kernel tests
        working-directory: components/kernel_rs
        run: cargo test --target x86_64-unknown-linux-gnu -- --test-threads=1
