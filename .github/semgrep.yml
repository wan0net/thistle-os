rules:
  - id: thistle-use-after-free-lvgl
    patterns:
      - pattern: |
          $PATH = (const char *)lv_obj_get_user_data($ROW);
          ...
          navigate_to($PATH);
    message: >
      Potential use-after-free: navigate_to() calls lv_obj_clean() which
      fires LV_EVENT_DELETE, freeing the user_data that $PATH points to.
      Copy the path to a stack buffer before calling navigate_to().
    languages: [c]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-416

  - id: thistle-hardcoded-sdcard-path
    patterns:
      - pattern: |
          "/sdcard/..."
      - pattern-not-inside: |
          .mount_point = "..."
    message: >
      Hardcoded "/sdcard" path. Use THISTLE_SDCARD macro from
      hal/sdcard_path.h for simulator compatibility.
    languages: [c]
    severity: WARNING
    metadata:
      category: correctness

  - id: thistle-esp-error-check
    pattern: |
      ESP_ERROR_CHECK(...)
    message: >
      ESP_ERROR_CHECK aborts on failure. Use explicit error checking
      with early return for recoverable operations.
    languages: [c]
    severity: WARNING
    metadata:
      category: reliability

  - id: thistle-missing-null-check-hal
    pattern: |
      hal_get_registry()->$FIELD->$METHOD(...)
    message: >
      Missing NULL check on HAL registry field. The driver may not be
      registered. Check hal_get_registry()->$FIELD before calling methods.
    languages: [c]
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-476

  - id: thistle-format-string
    patterns:
      - pattern: fprintf($FP, $VAR)
      - pattern-not: fprintf($FP, "...")
    message: >
      Potential format string vulnerability. Use fputs() for string
      output or ensure the format string is a constant.
    languages: [c]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-134

  - id: thistle-unsigned-app-permissions
    pattern: |
      permissions_grant($APP, PERM_ALL)
    message: >
      Granting PERM_ALL. Verify this is a signed/built-in app.
      Unsigned apps should only get PERM_IPC.
    languages: [c]
    severity: INFO
    metadata:
      category: security

  # ── Buffer overflow risks ──────────────────────────────────────────

  - id: thistle-sprintf-no-bounds
    patterns:
      - pattern: sprintf($BUF, ...)
      - pattern-not: snprintf(...)
    message: >
      Use snprintf() instead of sprintf() to prevent buffer overflow.
    languages: [c]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-120

  - id: thistle-strcpy-no-bounds
    patterns:
      - pattern: strcpy($DST, $SRC)
      - pattern-not: strncpy(...)
    message: >
      Use strncpy() or strlcpy() instead of strcpy() to prevent
      buffer overflow.
    languages: [c]
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-120

  - id: thistle-strcat-no-bounds
    pattern: strcat($DST, $SRC)
    message: >
      Use strncat() instead of strcat() to prevent buffer overflow.
    languages: [c]
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-120

  # ── Memory safety ─────────────────────────────────────────────────

  - id: thistle-malloc-no-null-check
    patterns:
      - pattern: |
          $P = malloc(...);
          ...
          $P->$FIELD
      - pattern-not: |
          $P = malloc(...);
          ...
          if ($P == NULL) { ... }
          ...
          $P->$FIELD
    message: >
      malloc() return value not checked for NULL before dereference.
    languages: [c]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-476

  # ── Crypto ────────────────────────────────────────────────────────

  - id: thistle-hardcoded-key
    patterns:
      - pattern-regex: '(aes_key|secret_key|private_key|password)\s*=\s*"[^"]{8,}"'
    message: >
      Possible hardcoded cryptographic key or password. Keys should
      be generated at runtime or loaded from secure storage.
    languages: [c]
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-798

  # ── Rust-specific ─────────────────────────────────────────────────

  - id: thistle-rust-unwrap-in-ffi
    patterns:
      - pattern: |
          pub extern "C" fn $FN(...) -> ... {
            ...
            $X.unwrap()
            ...
          }
      - pattern-not: |
          pub extern "C" fn $FN(...) -> ... {
            ...
            $X.lock().unwrap()
            ...
          }
    message: >
      unwrap() in an extern "C" FFI function will panic and abort the
      ESP32. Use match or unwrap_or instead.
    languages: [rust]
    severity: ERROR
    metadata:
      category: reliability

  - id: thistle-rust-panic-in-ffi
    pattern: |
      pub extern "C" fn $FN(...) -> ... {
        ...
        panic!(...)
        ...
      }
    message: >
      panic!() in an extern "C" FFI function will abort the ESP32.
      Return an error code instead.
    languages: [rust]
    severity: ERROR
    metadata:
      category: reliability

  - id: thistle-rust-println-embedded
    pattern: println!(...)
    message: >
      println!() is not available on ESP32. Use esp_log_write() via
      FFI or remove the print statement.
    languages: [rust]
    severity: WARNING
    metadata:
      category: correctness
