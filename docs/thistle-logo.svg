<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(300, 300)">
    <defs>
      <style>
        /* Purple accent triangles */
        .p { fill: #9D4EDD; stroke: transparent; stroke-width: 2.2; stroke-linejoin: round; }
        /* Background-colored triangles — use currentColor so they match any bg */
        .b { fill: currentColor; stroke: transparent; stroke-width: 2.2; stroke-linejoin: round; }
        /* Purple accent line */
        .line { fill: #9D4EDD; stroke: transparent; stroke-width: 2; stroke-linejoin: round; }
        /* Monaspace Neon — inherits color from context */
        .txt { font-family: 'Monaspace Neon', 'Monaspace', monospace; font-weight: 800; fill: currentColor; letter-spacing: -0.5px; }
      </style>
    </defs>

    <g transform="scale(1.15)">

      <rect x="-100" y="-3.5" width="200" height="7" class="line" rx="1" />

      <g transform="translate(0, -7)">
        <polygon points="-100,0 -50,0 -75,-43.3" class="b" />
        <polygon points="-75,-43.3 -25,-43.3 -50,0" class="b" />
        <polygon points="-50,0 0,0 -25,-43.3" class="b" />
        <polygon points="-25,-43.3 25,-43.3 0,0" class="p" />
        <polygon points="0,0 50,0 25,-43.3" class="b" />
        <polygon points="25,-43.3 75,-43.3 50,0" class="b" />
        <polygon points="50,0 100,0 75,-43.3" class="b" />

        <polygon points="-75,-43.3 -25,-43.3 -50,-86.6" class="b" />
        <polygon points="-50,-86.6 0,-86.6 -25,-43.3" class="p" />
        <polygon points="-25,-43.3 25,-43.3 0,-86.6" class="p" />
        <polygon points="0,-86.6 50,-86.6 25,-43.3" class="p" />
        <polygon points="25,-43.3 75,-43.3 50,-86.6" class="b" />

        <g transform="translate(-25, -86.6)">
           <polygon points="-15,0 0,0 -15,-15" class="p" />
           <polygon points="15,0 0,0 15,-15" class="p" />
        </g>
        <g transform="translate(25, -86.6)">
           <polygon points="-15,0 0,0 -15,-15" class="p" />
           <polygon points="15,0 0,0 15,-15" class="p" />
        </g>

        <g transform="translate(-62.5, -64.95) rotate(-60)">
          <polygon points="-12,0 0,0 -12,-12" class="b" />
          <polygon points="12,0 0,0 12,-12" class="b" />
        </g>
        <g transform="translate(62.5, -64.95) rotate(60)">
          <polygon points="-12,0 0,0 -12,-12" class="b" />
          <polygon points="12,0 0,0 12,-12" class="b" />
        </g>
      </g>

      <g transform="translate(0, 7)">
        <polygon points="-100,0 -50,0 -75,43.3" class="b" />
        <polygon points="-75,43.3 -25,43.3 -50,0" class="b" />
        <polygon points="-50,0 0,0 -25,43.3" class="b" />
        <polygon points="-25,43.3 25,43.3 0,0" class="p" />
        <polygon points="0,0 50,0 25,43.3" class="b" />
        <polygon points="25,43.3 75,43.3 50,0" class="b" />
        <polygon points="50,0 100,0 75,43.3" class="b" />

        <polygon points="-75,43.3 -25,43.3 -50,86.6" class="b" />
        <polygon points="-50,86.6 0,86.6 -25,43.3" class="b" />
        <polygon points="-25,43.3 25,43.3 0,86.6" class="p" />
        <polygon points="0,86.6 50,86.6 25,43.3" class="p" />
        <polygon points="25,43.3 75,43.3 50,86.6" class="b" />
      </g>
    </g>

    <text x="0" y="225" text-anchor="middle" font-size="52" class="txt">thistle-os</text>
  </g>
</svg>
