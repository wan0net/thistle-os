<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="800" height="550" font-family="system-ui, -apple-system, sans-serif" style="background: #fff">
  <defs>
    <marker id="arrow-d" markerWidth="10" markerHeight="7" refX="5" refY="7" orient="auto">
      <path d="M0,0 L5,7 L10,0" fill="none" stroke="#64748b" stroke-width="1.5"/>
    </marker>
    <filter id="shd" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Apps Row (Blue) -->
  <rect x="30" y="15" width="740" height="65" rx="12" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5" filter="url(#shd)"/>
  <text x="50" y="36" font-size="11" font-weight="700" fill="#1864ab">APPS</text>
  <rect x="50" y="42" width="90" height="28" rx="6" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="95" y="61" font-size="10" fill="#1864ab" text-anchor="middle">Launcher</text>
  <rect x="150" y="42" width="90" height="28" rx="6" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="195" y="61" font-size="10" fill="#1864ab" text-anchor="middle">Terminal</text>
  <rect x="250" y="42" width="90" height="28" rx="6" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="295" y="61" font-size="10" fill="#1864ab" text-anchor="middle">Navigator</text>
  <rect x="350" y="42" width="95" height="28" rx="6" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="397" y="61" font-size="10" fill="#1864ab" text-anchor="middle">Messenger</text>
  <rect x="455" y="42" width="120" height="28" rx="6" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="515" y="61" font-size="10" fill="#1864ab" text-anchor="middle">Display Server</text>
  <rect x="585" y="42" width="80" height="28" rx="6" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="625" y="61" font-size="10" fill="#1864ab" text-anchor="middle">Settings</text>

  <!-- Arrow -->
  <line x1="400" y1="80" x2="400" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-d)"/>
  <text x="400" y="100" font-size="9" fill="#64748b" text-anchor="middle" font-weight="600">syscall ABI</text>

  <!-- HAL Registry (Purple) -->
  <rect x="30" y="115" width="740" height="100" rx="12" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shd)"/>
  <text x="50" y="137" font-size="11" font-weight="700" fill="#5b21b6">HAL REGISTRY (vtable slots)</text>

  <rect x="50" y="145" width="88" height="28" rx="6" fill="#fff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="94" y="164" font-size="10" fill="#5b21b6" text-anchor="middle">Display</text>
  <rect x="148" y="145" width="75" height="28" rx="6" fill="#fff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="185" y="164" font-size="10" fill="#5b21b6" text-anchor="middle">Input</text>
  <rect x="233" y="145" width="75" height="28" rx="6" fill="#fff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="270" y="164" font-size="10" fill="#5b21b6" text-anchor="middle">Radio</text>
  <rect x="318" y="145" width="68" height="28" rx="6" fill="#fff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="352" y="164" font-size="10" fill="#5b21b6" text-anchor="middle">GPS</text>
  <rect x="396" y="145" width="75" height="28" rx="6" fill="#fff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="433" y="164" font-size="10" fill="#5b21b6" text-anchor="middle">Power</text>
  <rect x="481" y="145" width="65" height="28" rx="6" fill="#fff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="513" y="164" font-size="10" fill="#5b21b6" text-anchor="middle">IMU</text>
  <rect x="556" y="145" width="90" height="28" rx="6" fill="#fff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="601" y="164" font-size="9" fill="#5b21b6" text-anchor="middle">Audio|RTC|Crypto</text>

  <!-- 11 interfaces note -->
  <rect x="50" y="182" width="130" height="22" rx="5" fill="#8b5cf6" opacity="0.12"/>
  <text x="115" y="197" font-size="9" fill="#5b21b6" text-anchor="middle" font-weight="600">11 HAL interfaces</text>

  <!-- Arrow -->
  <line x1="400" y1="215" x2="400" y2="245" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-d)"/>
  <text x="400" y="235" font-size="9" fill="#64748b" text-anchor="middle" font-weight="600">vtable fn ptrs</text>

  <!-- Bus Handles (Orange) -->
  <rect x="30" y="250" width="740" height="65" rx="12" fill="#ffd8a8" stroke="#f59e0b" stroke-width="1.5" filter="url(#shd)"/>
  <text x="50" y="271" font-size="11" font-weight="700" fill="#92400e">BUS HANDLES</text>
  <rect x="50" y="278" width="120" height="28" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="110" y="297" font-size="10" fill="#92400e" text-anchor="middle">I2C Bus 0</text>
  <rect x="185" y="278" width="120" height="28" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="245" y="297" font-size="10" fill="#92400e" text-anchor="middle">I2C Bus 1</text>
  <rect x="320" y="278" width="120" height="28" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="380" y="297" font-size="10" fill="#92400e" text-anchor="middle">SPI Bus 0</text>
  <rect x="455" y="278" width="120" height="28" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="515" y="297" font-size="10" fill="#92400e" text-anchor="middle">SPI Bus 1</text>
  <rect x="590" y="278" width="100" height="28" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="640" y="297" font-size="10" fill="#92400e" text-anchor="middle">UART Bus</text>

  <!-- Arrow -->
  <line x1="400" y1="315" x2="400" y2="345" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-d)"/>

  <!-- Drivers (Green) -->
  <rect x="30" y="350" width="740" height="95" rx="12" fill="#b2f2bb" stroke="#22c55e" stroke-width="1.5" filter="url(#shd)"/>
  <text x="50" y="372" font-size="11" font-weight="700" fill="#166534">DRIVERS (.drv.elf)</text>
  <rect x="50" y="380" width="85" height="28" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="92" y="399" font-size="10" fill="#166534" text-anchor="middle">ST7789</text>
  <rect x="145" y="380" width="85" height="28" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="187" y="399" font-size="10" fill="#166534" text-anchor="middle">E-Paper</text>
  <rect x="240" y="380" width="85" height="28" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="282" y="399" font-size="10" fill="#166534" text-anchor="middle">TCA8418</text>
  <rect x="335" y="380" width="85" height="28" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="377" y="399" font-size="10" fill="#166534" text-anchor="middle">CST328</text>
  <rect x="430" y="380" width="85" height="28" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="472" y="399" font-size="10" fill="#166534" text-anchor="middle">SX1262</text>
  <rect x="525" y="380" width="95" height="28" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="572" y="399" font-size="10" fill="#166534" text-anchor="middle">Mia-M10Q</text>
  <rect x="630" y="380" width="90" height="28" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="675" y="399" font-size="10" fill="#166534" text-anchor="middle">PCF8563</text>

  <!-- 15 drivers badge -->
  <rect x="50" y="416" width="150" height="20" rx="5" fill="#22c55e" opacity="0.12"/>
  <text x="125" y="430" font-size="9" fill="#166534" text-anchor="middle" font-weight="600">15 drivers (13 Rust + 2 C)</text>

  <!-- Arrow -->
  <line x1="400" y1="445" x2="400" y2="475" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-d)"/>

  <!-- Hardware (Red) -->
  <rect x="30" y="480" width="740" height="50" rx="12" fill="#ffc9c9" stroke="#ef4444" stroke-width="1.5" filter="url(#shd)"/>
  <text x="400" y="510" font-size="13" fill="#991b1b" text-anchor="middle" font-weight="700">Physical Hardware (ESP32 / S2 / S3 / C3 / C6 / H2)</text>
</svg>
