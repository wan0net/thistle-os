<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" width="800" height="650" font-family="system-ui, -apple-system, sans-serif" style="background: #fff">
  <defs>
    <marker id="arrow-down" markerWidth="10" markerHeight="7" refX="5" refY="7" orient="auto">
      <path d="M0,0 L5,7 L10,0" fill="none" stroke="#64748b" stroke-width="1.5"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Recovery Zone (Red) -->
  <rect x="30" y="20" width="740" height="120" rx="12" fill="#ffc9c9" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="48" font-size="13" font-weight="700" fill="#991b1b">RECOVERY (Immutable, Root of Trust)</text>

  <rect x="50" y="58" width="155" height="36" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1"/>
  <text x="127" y="81" font-size="11" fill="#991b1b" text-anchor="middle" font-weight="600">Recovery OS (Rust)</text>

  <rect x="220" y="58" width="130" height="36" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1"/>
  <text x="285" y="81" font-size="11" fill="#991b1b" text-anchor="middle">WiFi AP + Portal</text>

  <rect x="365" y="58" width="115" height="36" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1"/>
  <text x="422" y="81" font-size="11" fill="#991b1b" text-anchor="middle">HW Scanner</text>

  <rect x="495" y="58" width="105" height="36" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1"/>
  <text x="547" y="81" font-size="11" fill="#991b1b" text-anchor="middle">OTA Flash</text>

  <rect x="615" y="58" width="140" height="36" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1"/>
  <text x="685" y="81" font-size="11" fill="#991b1b" text-anchor="middle">Multi-arch Detect</text>

  <!-- Arrow: Recovery -> Kernel -->
  <line x1="400" y1="140" x2="400" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-down)"/>
  <rect x="330" y="148" width="140" height="22" rx="4" fill="#fff" stroke="#94a3b8" stroke-width="1"/>
  <text x="400" y="164" font-size="10" fill="#64748b" text-anchor="middle" font-weight="600">Ed25519 verify</text>

  <!-- Kernel Zone (Blue) -->
  <rect x="30" y="185" width="740" height="240" rx="12" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="213" font-size="13" font-weight="700" fill="#1864ab">KERNEL (100% Rust, Hardware-Independent)</text>

  <!-- Kernel boxes row 1 -->
  <rect x="50" y="223" width="120" height="36" rx="8" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="110" y="245" font-size="11" fill="#1864ab" text-anchor="middle">HAL Registry</text>

  <rect x="180" y="223" width="128" height="36" rx="8" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="244" y="245" font-size="11" fill="#1864ab" text-anchor="middle">Display Server</text>

  <rect x="318" y="223" width="120" height="36" rx="8" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="378" y="245" font-size="11" fill="#1864ab" text-anchor="middle">App Manager</text>

  <rect x="448" y="223" width="115" height="36" rx="8" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="505" y="245" font-size="11" fill="#1864ab" text-anchor="middle">IPC + Events</text>

  <!-- Kernel boxes row 2 -->
  <rect x="573" y="223" width="85" height="36" rx="8" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="615" y="245" font-size="11" fill="#1864ab" text-anchor="middle">Crypto</text>

  <rect x="668" y="223" width="90" height="36" rx="8" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="713" y="245" font-size="11" fill="#1864ab" text-anchor="middle">Signing</text>

  <rect x="50" y="270" width="135" height="36" rx="8" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="117" y="292" font-size="11" fill="#1864ab" text-anchor="middle">Net + WiFi + BLE</text>

  <rect x="195" y="270" width="80" height="36" rx="8" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="235" y="292" font-size="11" fill="#1864ab" text-anchor="middle">Mesh</text>

  <rect x="285" y="270" width="80" height="36" rx="8" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="325" y="292" font-size="11" fill="#1864ab" text-anchor="middle">Shell</text>

  <rect x="375" y="270" width="105" height="36" rx="8" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="427" y="292" font-size="11" fill="#1864ab" text-anchor="middle">ELF Loader</text>

  <rect x="490" y="270" width="115" height="36" rx="8" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="547" y="292" font-size="11" fill="#1864ab" text-anchor="middle">Permissions</text>

  <rect x="615" y="270" width="80" height="36" rx="8" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="655" y="292" font-size="11" fill="#1864ab" text-anchor="middle">OTA</text>

  <!-- Syscall table bar -->
  <rect x="50" y="320" width="708" height="34" rx="8" fill="#1864ab" opacity="0.15" stroke="#4a9eed" stroke-width="1"/>
  <text x="404" y="342" font-size="12" fill="#1864ab" text-anchor="middle" font-weight="700">Syscall Table (~106 entries, C ABI)</text>

  <!-- 57 modules / 1259 tests badge -->
  <rect x="50" y="370" width="160" height="24" rx="6" fill="#1864ab" opacity="0.12"/>
  <text x="130" y="387" font-size="10" fill="#1864ab" text-anchor="middle" font-weight="600">57 modules, 1259 tests</text>

  <!-- Arrow: Kernel -> Userspace -->
  <line x1="400" y1="425" x2="400" y2="465" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-down)"/>
  <rect x="345" y="433" width="110" height="22" rx="4" fill="#fff" stroke="#94a3b8" stroke-width="1"/>
  <text x="400" y="448" font-size="10" fill="#64748b" text-anchor="middle" font-weight="600">loads from</text>

  <!-- Userspace Zone (Green) -->
  <rect x="30" y="470" width="740" height="160" rx="12" fill="#b2f2bb" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="498" font-size="13" font-weight="700" fill="#166534">USERSPACE (SPIFFS + SD Card, Updateable)</text>

  <!-- Userspace boxes row 1 -->
  <rect x="50" y="508" width="135" height="36" rx="8" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="117" y="530" font-size="11" fill="#166534" text-anchor="middle">Drivers (.drv.elf)</text>

  <rect x="195" y="508" width="125" height="36" rx="8" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="257" y="530" font-size="11" fill="#166534" text-anchor="middle">Apps (.app.elf)</text>

  <rect x="330" y="508" width="120" height="36" rx="8" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="390" y="530" font-size="11" fill="#166534" text-anchor="middle">WMs (.wm.elf)</text>

  <rect x="460" y="508" width="90" height="36" rx="8" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="505" y="530" font-size="11" fill="#166534" text-anchor="middle">Themes</text>

  <!-- Userspace boxes row 2 -->
  <rect x="560" y="508" width="100" height="36" rx="8" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="610" y="530" font-size="11" fill="#166534" text-anchor="middle">App Store</text>

  <rect x="50" y="555" width="120" height="36" rx="8" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="110" y="577" font-size="11" fill="#166534" text-anchor="middle">Board Config</text>

  <rect x="180" y="555" width="130" height="36" rx="8" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="245" y="577" font-size="11" fill="#166534" text-anchor="middle">System Config</text>

  <rect x="320" y="555" width="130" height="36" rx="8" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="385" y="577" font-size="11" fill="#166534" text-anchor="middle">Ed25519 Signatures</text>

  <rect x="460" y="555" width="100" height="36" rx="8" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="510" y="577" font-size="11" fill="#166534" text-anchor="middle">Manifests</text>
</svg>
