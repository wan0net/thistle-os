<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="800" height="550" font-family="system-ui, -apple-system, sans-serif" style="background: #fff">
  <defs>
    <marker id="ad" markerWidth="10" markerHeight="7" refX="5" refY="7" orient="auto">
      <path d="M0,0 L5,7 L10,0" fill="none" stroke="#64748b" stroke-width="1.5"/>
    </marker>
    <filter id="sf" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Shared Source Code (Purple) - top center -->
  <rect x="250" y="20" width="300" height="70" rx="12" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#sf)"/>
  <text x="400" y="50" font-size="14" font-weight="700" fill="#5b21b6" text-anchor="middle">Shared Source Code</text>
  <text x="400" y="70" font-size="10" fill="#5b21b6" text-anchor="middle">Rust kernel + C HAL + Apps + Drivers</text>

  <!-- Three arrows fanning down -->
  <line x1="310" y1="90" x2="160" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#ad)"/>
  <line x1="400" y1="90" x2="400" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#ad)"/>
  <line x1="490" y1="90" x2="640" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#ad)"/>

  <!-- ESP-IDF Firmware (Red) - left -->
  <rect x="30" y="155" width="260" height="220" rx="12" fill="#ffc9c9" stroke="#ef4444" stroke-width="1.5" filter="url(#sf)"/>
  <text x="160" y="182" font-size="13" font-weight="700" fill="#991b1b" text-anchor="middle">ESP-IDF Firmware</text>

  <rect x="50" y="195" width="220" height="30" rx="6" fill="#fff" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="215" font-size="11" fill="#991b1b" text-anchor="middle">idf.py build</text>

  <rect x="50" y="233" width="220" height="30" rx="6" fill="#fff" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="253" font-size="11" fill="#991b1b" text-anchor="middle">cargo +esp build --release</text>

  <rect x="50" y="271" width="220" height="30" rx="6" fill="#fff" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="291" font-size="11" fill="#991b1b" text-anchor="middle">Partition: ota_0 + ota_1</text>

  <rect x="70" y="315" width="180" height="28" rx="6" fill="#ef4444" opacity="0.15"/>
  <text x="160" y="334" font-size="12" fill="#991b1b" text-anchor="middle" font-weight="700">thistle_os.bin</text>

  <text x="160" y="362" font-size="9" fill="#991b1b" text-anchor="middle">ESP32 / S2 / S3 / C3 / C6 / H2</text>

  <!-- SDL2 Simulator (Blue) - center -->
  <rect x="310" y="155" width="180" height="220" rx="12" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5" filter="url(#sf)"/>
  <text x="400" y="182" font-size="13" font-weight="700" fill="#1864ab" text-anchor="middle">SDL2 Simulator</text>

  <rect x="325" y="195" width="150" height="30" rx="6" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="400" y="215" font-size="11" fill="#1864ab" text-anchor="middle">cmake &amp;&amp; make</text>

  <rect x="325" y="233" width="150" height="30" rx="6" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="400" y="253" font-size="11" fill="#1864ab" text-anchor="middle">cargo test (host)</text>

  <rect x="325" y="271" width="150" height="30" rx="6" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="400" y="291" font-size="11" fill="#1864ab" text-anchor="middle">SDL2 + libcurl</text>

  <rect x="340" y="315" width="120" height="28" rx="6" fill="#4a9eed" opacity="0.15"/>
  <text x="400" y="334" font-size="12" fill="#1864ab" text-anchor="middle" font-weight="700">thistle_sim</text>

  <text x="400" y="362" font-size="9" fill="#1864ab" text-anchor="middle">macOS / Linux / Windows</text>

  <!-- WASM Simulator (Green) - right -->
  <rect x="510" y="155" width="260" height="220" rx="12" fill="#b2f2bb" stroke="#22c55e" stroke-width="1.5" filter="url(#sf)"/>
  <text x="640" y="182" font-size="13" font-weight="700" fill="#166534" text-anchor="middle">WASM Simulator</text>

  <rect x="530" y="195" width="220" height="30" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="640" y="215" font-size="11" fill="#166534" text-anchor="middle">emcmake cmake &amp;&amp; make</text>

  <rect x="530" y="233" width="220" height="30" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="640" y="253" font-size="11" fill="#166534" text-anchor="middle">cargo wasm32-unknown-emscripten</text>

  <rect x="530" y="271" width="220" height="30" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="640" y="291" font-size="11" fill="#166534" text-anchor="middle">Emscripten + SDL2 port</text>

  <rect x="555" y="315" width="170" height="28" rx="6" fill="#22c55e" opacity="0.15"/>
  <text x="640" y="334" font-size="12" fill="#166534" text-anchor="middle" font-weight="700">thistle_wasm.html</text>

  <text x="640" y="362" font-size="9" fill="#166534" text-anchor="middle">Any modern browser</text>

  <!-- Arrows down to CI -->
  <line x1="160" y1="375" x2="160" y2="430" stroke="#64748b" stroke-width="1.5" marker-end="url(#ad)"/>
  <line x1="400" y1="375" x2="400" y2="430" stroke="#64748b" stroke-width="1.5" marker-end="url(#ad)"/>
  <line x1="640" y1="375" x2="640" y2="430" stroke="#64748b" stroke-width="1.5" marker-end="url(#ad)"/>

  <!-- CI Bar (Orange) - bottom -->
  <rect x="30" y="435" width="740" height="95" rx="12" fill="#ffd8a8" stroke="#f59e0b" stroke-width="1.5" filter="url(#sf)"/>
  <text x="400" y="460" font-size="13" font-weight="700" fill="#92400e" text-anchor="middle">CI / CD (GitHub Actions)</text>

  <rect x="50" y="470" width="120" height="30" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="110" y="490" font-size="10" fill="#92400e" text-anchor="middle">Firmware Build</text>

  <rect x="185" y="470" width="105" height="30" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="237" y="490" font-size="10" fill="#92400e" text-anchor="middle">Rust Tests</text>

  <rect x="305" y="470" width="95" height="30" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="352" y="490" font-size="10" fill="#92400e" text-anchor="middle">Sim Boot</text>

  <rect x="415" y="470" width="105" height="30" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="467" y="490" font-size="10" fill="#92400e" text-anchor="middle">Integration</text>

  <rect x="535" y="470" width="130" height="30" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="600" y="490" font-size="10" fill="#92400e" text-anchor="middle">Semgrep + Trivy</text>

  <rect x="680" y="470" width="80" height="30" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="720" y="490" font-size="10" fill="#92400e" text-anchor="middle">WASM</text>
</svg>
