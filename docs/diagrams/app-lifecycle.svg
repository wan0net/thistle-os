<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400" font-family="system-ui, -apple-system, sans-serif" style="background: #fff">
  <defs>
    <marker id="a-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#64748b"/>
    </marker>
    <marker id="a-l" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10,0 0,3.5 10,7" fill="#64748b"/>
    </marker>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="350" y="30" font-size="16" font-weight="700" fill="#1e293b" text-anchor="middle">App Lifecycle State Machine</text>

  <!-- Unloaded (Red) -->
  <ellipse cx="120" cy="140" rx="80" ry="35" fill="#ffc9c9" stroke="#ef4444" stroke-width="2" filter="url(#sh)"/>
  <text x="120" y="136" font-size="13" font-weight="600" fill="#991b1b" text-anchor="middle">Unloaded</text>
  <text x="120" y="152" font-size="9" fill="#991b1b" text-anchor="middle">no task, no memory</text>

  <!-- Loading (Orange) -->
  <ellipse cx="350" cy="140" rx="80" ry="35" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2" filter="url(#sh)"/>
  <text x="350" y="136" font-size="13" font-weight="600" fill="#92400e" text-anchor="middle">Loading</text>
  <text x="350" y="152" font-size="9" fill="#92400e" text-anchor="middle">ELF parse, alloc</text>

  <!-- Running (Green) -->
  <ellipse cx="580" cy="140" rx="80" ry="35" fill="#b2f2bb" stroke="#22c55e" stroke-width="2" filter="url(#sh)"/>
  <text x="580" y="136" font-size="13" font-weight="600" fill="#166534" text-anchor="middle">Running</text>
  <text x="580" y="152" font-size="9" fill="#166534" text-anchor="middle">active, has focus</text>

  <!-- Backgrounded (Blue) -->
  <ellipse cx="580" cy="290" rx="80" ry="35" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2" filter="url(#sh)"/>
  <text x="580" y="286" font-size="13" font-weight="600" fill="#1864ab" text-anchor="middle">Backgrounded</text>
  <text x="580" y="302" font-size="9" fill="#1864ab" text-anchor="middle">paused, hidden</text>

  <!-- Arrow: Unloaded -> Loading (on_create) -->
  <line x1="200" y1="140" x2="268" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#a-r)"/>
  <text x="234" y="130" font-size="10" fill="#64748b" text-anchor="middle" font-weight="600">on_create</text>

  <!-- Arrow: Loading -> Running (on_start) -->
  <line x1="430" y1="140" x2="498" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#a-r)"/>
  <text x="464" y="130" font-size="10" fill="#64748b" text-anchor="middle" font-weight="600">on_start</text>

  <!-- Arrow: Running -> Backgrounded (on_pause) -->
  <line x1="610" y1="175" x2="610" y2="253" stroke="#64748b" stroke-width="1.5" marker-end="url(#a-r)"/>
  <text x="645" y="218" font-size="10" fill="#64748b" text-anchor="middle" font-weight="600">on_pause</text>

  <!-- Arrow: Backgrounded -> Running (on_resume) -->
  <line x1="550" y1="255" x2="550" y2="177" stroke="#64748b" stroke-width="1.5" marker-end="url(#a-r)"/>
  <text x="515" y="218" font-size="10" fill="#64748b" text-anchor="middle" font-weight="600">on_resume</text>

  <!-- Arrow: Running -> Unloaded (on_destroy) - curved -->
  <path d="M500,150 Q350,230 200,150" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#a-l)" stroke-dasharray="6,3"/>
  <text x="350" y="210" font-size="10" fill="#64748b" text-anchor="middle" font-weight="600">on_destroy</text>

  <!-- Arrow: Backgrounded -> Unloaded (on_destroy) - curved -->
  <path d="M500,300 Q300,340 145,175" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#a-l)"/>
  <text x="290" y="310" font-size="10" fill="#64748b" text-anchor="middle" font-weight="600">on_destroy</text>

  <!-- Note boxes -->
  <rect x="30" y="330" width="190" height="45" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="125" y="350" font-size="10" fill="#475569" text-anchor="middle" font-weight="600">Launcher: pause only</text>
  <text x="125" y="365" font-size="9" fill="#64748b" text-anchor="middle">Always in memory, never destroyed</text>

  <rect x="420" y="350" width="200" height="35" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="520" y="372" font-size="10" fill="#475569" text-anchor="middle" font-weight="600">Future: save state to SD card</text>
</svg>
