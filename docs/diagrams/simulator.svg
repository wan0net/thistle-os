<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="800" height="550" font-family="system-ui, -apple-system, sans-serif" style="background: #fff">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="5" refY="7" orient="auto">
      <path d="M0,0 L5,7 L10,0" fill="none" stroke="#64748b" stroke-width="1.5"/>
    </marker>
    <filter id="s" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- SDL2 Layer (Blue) - top left -->
  <rect x="30" y="15" width="355" height="110" rx="12" fill="#a5d8ff" stroke="#4a9eed" stroke-width="1.5" filter="url(#s)"/>
  <text x="50" y="38" font-size="11" font-weight="700" fill="#1864ab">SDL2 LAYER</text>
  <rect x="50" y="48" width="110" height="28" rx="6" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="105" y="67" font-size="10" fill="#1864ab" text-anchor="middle">sim_display.c</text>
  <rect x="170" y="48" width="100" height="28" rx="6" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="220" y="67" font-size="10" fill="#1864ab" text-anchor="middle">sim_input.c</text>
  <rect x="280" y="48" width="95" height="28" rx="6" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="327" y="67" font-size="10" fill="#1864ab" text-anchor="middle">SDL2 Window</text>
  <rect x="50" y="85" width="100" height="28" rx="6" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="100" y="104" font-size="10" fill="#1864ab" text-anchor="middle">sim_vfs.c</text>
  <rect x="160" y="85" width="100" height="28" rx="6" fill="#fff" stroke="#4a9eed" stroke-width="1"/>
  <text x="210" y="104" font-size="10" fill="#1864ab" text-anchor="middle">libcurl HTTP</text>

  <!-- Testing Layer (Orange) - top right -->
  <rect x="415" y="15" width="355" height="110" rx="12" fill="#ffd8a8" stroke="#f59e0b" stroke-width="1.5" filter="url(#s)"/>
  <text x="435" y="38" font-size="11" font-weight="700" fill="#92400e">TESTING LAYER</text>
  <rect x="435" y="48" width="105" height="28" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="487" y="67" font-size="10" fill="#92400e" text-anchor="middle">sim_assert.c</text>
  <rect x="550" y="48" width="115" height="28" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="607" y="67" font-size="10" fill="#92400e" text-anchor="middle">sim_scenario.c</text>
  <rect x="435" y="85" width="120" height="28" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="495" y="104" font-size="10" fill="#92400e" text-anchor="middle">CI: 16+16 tests</text>
  <rect x="565" y="85" width="120" height="28" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
  <text x="625" y="104" font-size="10" fill="#92400e" text-anchor="middle">10 board configs</text>

  <!-- Arrows down -->
  <line x1="207" y1="125" x2="300" y2="165" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="592" y1="125" x2="500" y2="165" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Real Rust Kernel (Purple) - middle -->
  <rect x="100" y="170" width="600" height="110" rx="12" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#s)"/>
  <text x="120" y="194" font-size="11" font-weight="700" fill="#5b21b6">REAL RUST KERNEL (same code as firmware)</text>
  <rect x="120" y="204" width="95" height="28" rx="6" fill="#fff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="167" y="223" font-size="10" fill="#5b21b6" text-anchor="middle">57 Modules</text>
  <rect x="225" y="204" width="105" height="28" rx="6" fill="#fff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="277" y="223" font-size="10" fill="#5b21b6" text-anchor="middle">thistle_shell</text>
  <rect x="340" y="204" width="105" height="28" rx="6" fill="#fff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="392" y="223" font-size="10" fill="#5b21b6" text-anchor="middle">App Manager</text>
  <rect x="455" y="204" width="110" height="28" rx="6" fill="#fff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="510" y="223" font-size="10" fill="#5b21b6" text-anchor="middle">WiFi Manager</text>
  <rect x="575" y="204" width="110" height="28" rx="6" fill="#fff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="630" y="223" font-size="10" fill="#5b21b6" text-anchor="middle">Display Server</text>
  <!-- badge -->
  <rect x="120" y="242" width="110" height="22" rx="5" fill="#8b5cf6" opacity="0.12"/>
  <text x="175" y="257" font-size="9" fill="#5b21b6" text-anchor="middle" font-weight="600">1259 unit tests</text>

  <!-- Arrows down -->
  <line x1="280" y1="280" x2="220" y2="320" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="520" y1="280" x2="580" y2="320" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Fake HAL Drivers (Green) - bottom left -->
  <rect x="30" y="325" width="355" height="100" rx="12" fill="#b2f2bb" stroke="#22c55e" stroke-width="1.5" filter="url(#s)"/>
  <text x="50" y="348" font-size="11" font-weight="700" fill="#166534">FAKE HAL DRIVERS</text>
  <rect x="50" y="358" width="70" height="26" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="85" y="376" font-size="10" fill="#166534" text-anchor="middle">Power</text>
  <rect x="130" y="358" width="60" height="26" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="160" y="376" font-size="10" fill="#166534" text-anchor="middle">GPS</text>
  <rect x="200" y="358" width="60" height="26" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="230" y="376" font-size="10" fill="#166534" text-anchor="middle">IMU</text>
  <rect x="270" y="358" width="55" height="26" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="297" y="376" font-size="10" fill="#166534" text-anchor="middle">RTC</text>
  <rect x="50" y="392" width="65" height="26" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="82" y="410" font-size="10" fill="#166534" text-anchor="middle">Audio</text>
  <rect x="125" y="392" width="65" height="26" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="157" y="410" font-size="10" fill="#166534" text-anchor="middle">Radio</text>
  <rect x="200" y="392" width="80" height="26" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="240" y="410" font-size="10" fill="#166534" text-anchor="middle">Display</text>
  <rect x="290" y="392" width="80" height="26" rx="6" fill="#fff" stroke="#22c55e" stroke-width="1"/>
  <text x="330" y="410" font-size="10" fill="#166534" text-anchor="middle">Storage</text>

  <!-- Virtual I2C Bus (Teal) - bottom right -->
  <rect x="415" y="325" width="355" height="100" rx="12" fill="#c3fae8" stroke="#06b6d4" stroke-width="1.5" filter="url(#s)"/>
  <text x="435" y="348" font-size="11" font-weight="700" fill="#0e7490">VIRTUAL I2C BUS</text>
  <rect x="435" y="358" width="85" height="26" rx="6" fill="#fff" stroke="#06b6d4" stroke-width="1"/>
  <text x="477" y="376" font-size="10" fill="#0e7490" text-anchor="middle">PCF8563</text>
  <rect x="530" y="358" width="95" height="26" rx="6" fill="#fff" stroke="#06b6d4" stroke-width="1"/>
  <text x="577" y="376" font-size="10" fill="#0e7490" text-anchor="middle">QMI8658C</text>
  <rect x="635" y="358" width="85" height="26" rx="6" fill="#fff" stroke="#06b6d4" stroke-width="1"/>
  <text x="677" y="376" font-size="10" fill="#0e7490" text-anchor="middle">TCA8418</text>
  <rect x="435" y="392" width="80" height="26" rx="6" fill="#fff" stroke="#06b6d4" stroke-width="1"/>
  <text x="475" y="410" font-size="10" fill="#0e7490" text-anchor="middle">CST328</text>
  <rect x="525" y="392" width="80" height="26" rx="6" fill="#fff" stroke="#06b6d4" stroke-width="1"/>
  <text x="565" y="410" font-size="10" fill="#0e7490" text-anchor="middle">LTR-553</text>
  <rect x="615" y="392" width="105" height="26" rx="6" fill="#fff" stroke="#06b6d4" stroke-width="1"/>
  <text x="667" y="410" font-size="10" fill="#0e7490" text-anchor="middle">sim_i2c_bus</text>

  <!-- Platform Stubs (Red) - very bottom -->
  <rect x="30" y="455" width="740" height="75" rx="12" fill="#ffc9c9" stroke="#ef4444" stroke-width="1.5" filter="url(#s)"/>
  <text x="50" y="478" font-size="11" font-weight="700" fill="#991b1b">PLATFORM STUBS (replaces ESP-IDF)</text>
  <rect x="50" y="488" width="105" height="28" rx="6" fill="#fff" stroke="#ef4444" stroke-width="1"/>
  <text x="102" y="507" font-size="10" fill="#991b1b" text-anchor="middle">FreeRTOS</text>
  <rect x="165" y="488" width="80" height="28" rx="6" fill="#fff" stroke="#ef4444" stroke-width="1"/>
  <text x="205" y="507" font-size="10" fill="#991b1b" text-anchor="middle">NVS</text>
  <rect x="255" y="488" width="80" height="28" rx="6" fill="#fff" stroke="#ef4444" stroke-width="1"/>
  <text x="295" y="507" font-size="10" fill="#991b1b" text-anchor="middle">WiFi</text>
  <rect x="345" y="488" width="80" height="28" rx="6" fill="#fff" stroke="#ef4444" stroke-width="1"/>
  <text x="385" y="507" font-size="10" fill="#991b1b" text-anchor="middle">BLE</text>
  <rect x="435" y="488" width="80" height="28" rx="6" fill="#fff" stroke="#ef4444" stroke-width="1"/>
  <text x="475" y="507" font-size="10" fill="#991b1b" text-anchor="middle">GPIO</text>
  <rect x="525" y="488" width="80" height="28" rx="6" fill="#fff" stroke="#ef4444" stroke-width="1"/>
  <text x="565" y="507" font-size="10" fill="#991b1b" text-anchor="middle">SPI/I2C</text>
  <rect x="615" y="488" width="105" height="28" rx="6" fill="#fff" stroke="#ef4444" stroke-width="1"/>
  <text x="667" y="507" font-size="10" fill="#991b1b" text-anchor="middle">pthreads</text>
</svg>
